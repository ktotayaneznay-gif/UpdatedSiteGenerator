      50% { transform: scale(1.05); }

    // Доступные сайты (ещё не открытые)
    let availableSites = [];
    let clickCount = 0;
    let lastOpenedSite = null;

    // Инициализация доступных сайтов
    function initAvailableSites() {
      availableSites = [...ALL_SITES];
      clickCount = 0;
      lastOpenedSite = null;
      document.getElementById('clickCount').textContent = '0';
      document.getElementById('remainingCount').textContent = availableSites.length;
      document.getElementById('totalCount').textContent = ALL_SITES.length;
      updatePreview(null);
    }

    // Сбросить все сайты
    function resetSites() {
      initAvailableSites();
      const message = document.createElement('div');
      message.className = 'message';
      message.textContent = currentLang === 'ru' ? '🔄 Список сброшен! Все сайты снова доступны.' : '🔄 List reset! All sites are available again.';
      document.body.appendChild(message);
      setTimeout(() => message.remove(), 2000);
    }

    // Переключение языка
    window.switchLanguage = function(lang) {
      currentLang = lang;
      
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if ((lang === 'ru' && btn.textContent.includes('РУС')) || 
            (lang === 'en' && btn.textContent.includes('ENG'))) {
          btn.classList.add('active');
        }
      });
      
      document.querySelectorAll('[data-ru]').forEach(element => {
        if (element.dataset[lang]) {
          element.textContent = element.dataset[lang];
        }
      });
      
      document.title = translations[lang].title;
      
      if (lastOpenedSite) {
        updatePreview(lastOpenedSite);
      }
      
      localStorage.setItem('language', lang);
    };

    // Получить случайный сайт из доступных
    function getRandomSite() {
      if (availableSites.length === 0) {
        return null;
      }
      
      const randomIndex = Math.floor(Math.random() * availableSites.length);
      const site = availableSites[randomIndex];
      
      // Удаляем сайт из доступных
      availableSites.splice(randomIndex, 1);
      
      lastOpenedSite = site;
      return site;
    }

    // Обновить превью сайта
    function updatePreview(site) {
      const preview = document.getElementById('sitePreview');
      if (!site) {
        preview.style.display = 'none';
        return;
      }
      preview.style.display = 'block';
      document.getElementById('siteName').textContent = '🎯 ' + (currentLang === 'ru' ? site.name_ru : site.name_en);
      document.getElementById('siteDesc').textContent = currentLang === 'ru' ? site.desc_ru : site.desc_en;
    }

    // Создать конфетти
    function createConfetti(x, y) {
      const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff8e53', '#9b59b6', '#ff69b4', '#00d2ff'];
      
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = x + 'px';
        confetti.style.top = y + 'px';
        confetti.style.width = Math.random() * 10 + 5 + 'px';
        confetti.style.height = Math.random() * 10 + 5 + 'px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
        confetti.style.transform = `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px)`;
        
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    // Создать искры
    function createSparkles(x, y) {
      const emojis = ['✨', '⭐', '💫', '🌟', '🎉', '🎊', '💥', '🔥', '🌈', '💖'];
      
      for (let i = 0; i < 10; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        sparkle.style.left = (x + Math.random() * 100 - 50) + 'px';
        sparkle.style.top = (y + Math.random() * 100 - 50) + 'px';
        
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    // Сменить фоновый цвет
    function changeBackground() {
      const colors = [
        '#ff6b6b', '#ff8e53', '#ffd93d', '#6bcb77', 
        '#4d96ff', '#9b59b6', '#ff69b4', '#00d2ff',
        '#ff6348', '#a29bfe', '#fd79a8', '#00b894',
        '#e17055', '#6c5ce7', '#fdcb6e', '#e84393'
      ];
      document.body.style.background = colors[Math.floor(Math.random() * colors.length)];
    }

    // Сменить эмодзи
    function changeEmoji() {
      const emojis = ['🤪', '😜', '🤩', '🥳', '😎', '🤯', '🦄', '🌈', '💩', '👾', 
                      '🎃', '🤖', '👽', '🐙', '🦀', '🐸', '🦄', '🍕', '🌮', '🎪'];
      document.getElementById('mainEmoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];
    }

    // Показать сообщение
    function showMessage(text) {
      const message = document.createElement('div');
      message.className = 'message';
      message.textContent = text;
      document.body.appendChild(message);
      setTimeout(() => message.remove(), 2000);
    }

    // Открыть случайный сайт
    function openUselessSite(e) {
      if (availableSites.length === 0) {
        showMessage(translations[currentLang].allOpened);
        return;
      }
      
      const site = getRandomSite();
      if (!site) return;
      
      updatePreview(site);
      
      clickCount++;
      document.getElementById('clickCount').textContent = clickCount;
      document.getElementById('remainingCount').textContent = availableSites.length;
      
      changeBackground();
      changeEmoji();
      
      const x = e ? e.clientX : window.innerWidth / 2;
      const y = e ? e.clientY : window.innerHeight / 2;
      createConfetti(x, y);
      createSparkles(x, y);
      
      if (navigator.vibrate) {
        navigator.vibrate(200);
      }
      
      setTimeout(() => {
        window.open(site.url, '_blank', 'noopener,noreferrer');
      }, 500);
    }

    // Обработчики событий
    document.body.addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A' && !e.target.closest('.lang-switcher')) {
        openUselessSite(e);
      }
    });

    document.getElementById('uselessBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      openUselessSite(e);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openUselessSite(e);
      }
    });

    // Плавающие эмодзи
    function createFloatingEmoji() {
      const emojis = ['🤪', '🎉', '🌟', '💩', '🦄', '🌈', '🎲', '✨', '🔥', '💎'];
      const emoji = document.createElement('div');
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.cssText = `
        position: fixed;
        font-size: ${Math.random() * 30 + 20}px;
        left: ${Math.random() * 100}%;
        top: -50px;
        animation: fall ${Math.random() * 3 + 3}s linear forwards;
        pointer-events: none;
        z-index: 1;
        opacity: 0.3;
      `;
      document.body.appendChild(emoji);
      setTimeout(() => emoji.remove(), 6000);
    }

    setInterval(createFloatingEmoji, 2000);

    // Сделать resetSites глобальной
    window.resetSites = resetSites;

    // Инициализация при загрузке
    window.addEventListener('load', () => {
      const savedLang = localStorage.getItem('language') || 'ru';
      window.switchLanguage(savedLang);
      initAvailableSites();
      console.log(translations[currentLang].welcome);
      console.log(translations[currentLang].clickAnywhere);
      console.log(ALL_SITES.length + ' ' + translations[currentLang].sites);
    });
  </script>
</body>
